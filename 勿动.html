<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 开发工程师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1d1d1f;
            --bg-card: #2d2d2f;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section {
            padding: 100px 0;
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 60px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 20px 0;
            transition: var(--transition);
        }

        .nav.scrolled {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 0;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .hero-title {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease-out;
        }

        .hero-subtitle {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .hero-description {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .hero-cta {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .hero-cta:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 113, 227, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .about {
            background: var(--bg-secondary);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-text {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .about-text p {
            margin-bottom: 20px;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-number {
            font-size: 48px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .skills {
            background: var(--bg-primary);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .skill-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .skill-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-percentage {
            font-size: 14px;
            color: var(--accent);
        }

        .skill-bar {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }

        .skill-progress {
            height: 100%;
            background: var(--gradient);
            border-radius: 4px;
            width: 0;
            transition: width 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .projects {
            background: var(--bg-secondary);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .project-image {
            width: 100%;
            height: 200px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }

        .project-content {
            padding: 30px;
        }

        .project-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .project-description {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .project-tag {
            padding: 5px 15px;
            background: var(--bg-primary);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .project-links {
            display: flex;
            gap: 15px;
        }

        .project-link {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .project-link:hover {
            background: var(--accent-hover);
        }

        .contact {
            background: var(--bg-primary);
        }

        .contact-content {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-description {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: var(--bg-card);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
        }

        .contact-link:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 113, 227, 0.3);
        }

        .contact-icon {
            font-size: 24px;
        }

        .footer {
            background: var(--bg-secondary);
            padding: 40px 0;
            text-align: center;
        }

        .footer-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 36px;
            }

            .hero-title {
                font-size: 48px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .hero-description {
                font-size: 16px;
            }

            .about-content {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg-secondary);
                flex-direction: column;
                padding: 20px;
                gap: 15px;
            }

            .nav-links.active {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .contact-links {
                flex-direction: column;
                align-items: center;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .slide-in-left {
            animation: slideInLeft 0.8s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-in-right {
            animation: slideInRight 0.8s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .scale-in {
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <nav class="nav">

            <ul class="nav-links">

    <section id="home" class="hero">

    <section id="skills" class="section skills">

    <section id="projects" class="section projects">

    <section id="contact" class="section contact">

        };

        function renderHero() {
            document.getElementById('hero-title').textContent = config.personal.name;
            document.getElementById('hero-subtitle').textContent = config.personal.title;
            document.getElementById('hero-description').textContent = config.personal.description;
        }

        function renderAbout() {
            const aboutText = document.getElementById('about-text');
            config.about.paragraphs.forEach((paragraph, index) => {
                const p = document.createElement('p');
                p.textContent = paragraph;
                p.style.animationDelay = `${index * 0.2}s`;
                p.classList.add('fade-in');
                aboutText.appendChild(p);
            });

            const aboutStats = document.getElementById('about-stats');
            config.about.stats.forEach((stat, index) => {
                const statCard = document.createElement('div');
                statCard.className = 'stat-card';
                statCard.style.animationDelay = `${index * 0.1}s`;
                statCard.classList.add('scale-in');
                statCard.innerHTML = `
                    <div class="stat-number">${stat.number}</div>
                    <div class="stat-label">${stat.label}</div>
                `;
                aboutStats.appendChild(statCard);
            });
        }

        function renderSkills() {
            const skillsGrid = document.getElementById('skills-grid');
            config.skills.forEach((skill, index) => {
                const skillCard = document.createElement('div');
                skillCard.className = 'skill-card';
                skillCard.style.animationDelay = `${index * 0.1}s`;
                skillCard.classList.add('slide-in-left');
                skillCard.innerHTML = `
                    <div class="skill-name">
                        ${skill.name}
                        <span class="skill-percentage">${skill.percentage}%</span>
                    </div>
                    <div class="skill-bar">
                        <div class="skill-progress" data-percentage="${skill.percentage}"></div>
                    </div>
                `;
                skillsGrid.appendChild(skillCard);
            });
        }

        function renderProjects() {
            const projectsGrid = document.getElementById('projects-grid');
            config.projects.forEach((project, index) => {
                const projectCard = document.createElement('div');
                projectCard.className = 'project-card';
                projectCard.style.animationDelay = `${index * 0.15}s`;
                projectCard.classList.add('slide-in-right');
                projectCard.innerHTML = `
                    <div class="project-image">${project.icon}</div>
                    <div class="project-content">
                        <h3 class="project-title">${project.title}</h3>
                        <p class="project-description">${project.description}</p>
                        <div class="project-tags">
                            ${project.tags.map(tag => `<span class="project-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="project-links">
                            <a href="${project.detailsLink || '#'}" class="project-link" target="_blank" rel="noopener noreferrer">查看详情</a>
                            <a href="${project.sourceLink || '#'}" class="project-link" target="_blank" rel="noopener noreferrer">源码</a>
                        </div>
                    </div>
                `;
                projectsGrid.appendChild(projectCard);
            });
        }

        function renderContact() {
            document.getElementById('contact-description').textContent = config.contact.description;
            
            const contactLinks = document.getElementById('contact-links');
            config.contact.links.forEach((link, index) => {
                const contactLink = document.createElement('a');
                contactLink.href = link.url;
                contactLink.className = 'contact-link';
                contactLink.style.animationDelay = `${index * 0.1}s`;
                contactLink.classList.add('fade-in');
                contactLink.innerHTML = `
                    <span class="contact-icon">${link.icon}</span>
                    <span>${link.name}</span>
                `;
                contactLinks.appendChild(contactLink);
            });
        }

        function renderFooter() {
            document.getElementById('footer-text').textContent = config.footer.text;
        }

        function initScrollAnimations() {
            const sections = document.querySelectorAll('.section');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        
                        if (entry.target.id === 'skills') {
                            animateSkillBars();
                        }
                    }
                });
            }, {
                threshold: 0.1
            });

            sections.forEach(section => {
                observer.observe(section);
            });
        }

        function animateSkillBars() {
            const skillBars = document.querySelectorAll('.skill-progress');
            skillBars.forEach(bar => {
                const percentage = bar.getAttribute('data-percentage');
                setTimeout(() => {
                    bar.style.width = `${percentage}%`;
                }, 200);
            });
        }

        function initNavScroll() {
            const nav = document.querySelector('.nav');
            
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            });
        }

        function initMobileMenu() {
            const menuBtn = document.querySelector('.mobile-menu-btn');
            const navLinks = document.querySelector('.nav-links');
            
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });

            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('active');
                });
            });
        }

        function initSmoothScroll() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }

        function init() {
            renderHero();
            renderAbout();
            renderSkills();
            renderProjects();
            renderContact();
            renderFooter();
            initScrollAnimations();
            initNavScroll();
            initMobileMenu();
            initSmoothScroll();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
